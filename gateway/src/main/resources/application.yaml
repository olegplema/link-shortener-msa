spring:
  config:
    import: optional:configserver:http://${CONFIG_HOST:localhost}:${SERVICE_PORT:8888}
  application:
    name: gateway
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
logging:
  pattern:
    level: "%5p [requestId:%X{requestId:-}]"
