spring:
  application:
    name: discovery-service
server:
  port: ${SERVICE_PORT:8888}
  shutdown: graceful
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
logging:
  level:
    com.netflix.eureka: OFF
    com.netflix.discovery: OFF
