server:
  port: ${SERVICE_PORT:8888}
  shutdown: graceful
spring:
  application:
    name: config-server
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:native}
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/configs
eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8080/eureka/ # TODO env
    register-with-eureka: false
    fetch-registry: false